# 在 GitHub Actions 上产出「可重定位」macOS aria2c（含依赖 dylib）
# 发布到本仓库 Releases，供 raystyle/dotfiles aria2/install.sh 下载
#
name: build-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag（默认 v1.37.0）"
        required: false
        default: "v1.37.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: aria2c-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # arm64 runner 充足；x86_64 也在 arm runner 上用 Rosetta 编，避免 macos-13 排队到天荒地老
          - os: macos-14
            arch: arm64
            brew_arch: arm64
          - os: macos-14
            arch: x86_64
            brew_arch: x86_64

    steps:
      - name: Install aria2 + dylibbundler
        run: |
          set -euo pipefail
          # x86_64 job：在 arm 机器上通过 Rosetta 装 Intel brew 前缀（若可用）
          if [[ "${{ matrix.brew_arch }}" == "x86_64" ]]; then
            if ! arch -x86_64 /usr/bin/true 2>/dev/null; then
              echo "Rosetta 不可用，无法在 arm runner 上产 x86_64"
              exit 1
            fi
            # 确保 x86 brew 存在
            if [[ ! -x /usr/local/bin/brew ]]; then
              arch -x86_64 /bin/bash -c 'NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'
            fi
            eval "$(/usr/local/bin/brew shellenv)"
            arch -x86_64 /usr/local/bin/brew update
            arch -x86_64 /usr/local/bin/brew install aria2 dylibbundler
            echo "/usr/local/bin" >> "$GITHUB_PATH"
            export PATH="/usr/local/bin:$PATH"
          else
            brew update
            brew install aria2 dylibbundler
          fi
          command -v aria2c
          command -v dylibbundler
          file "$(command -v aria2c)"
          aria2c -v | head -2 || true

      - name: Package relocatable tree
        run: |
          set -euo pipefail
          if [[ "${{ matrix.brew_arch }}" == "x86_64" ]]; then
            eval "$(/usr/local/bin/brew shellenv)"
            export PATH="/usr/local/bin:$PATH"
          fi
          BIN="$(command -v aria2c)"
          REAL="$(python3 -c 'import os,sys; print(os.path.realpath(sys.argv[1]))' "$BIN")"
          echo "REAL=$REAL"
          file "$REAL"
          test -f "$REAL"

          STAGE="${RUNNER_TEMP}/aria2c-dist"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/bin" "$STAGE/lib"

          cp -f "$REAL" "$STAGE/bin/aria2c"
          chmod 755 "$STAGE/bin/aria2c"

          # 把 brew 依赖打进 lib/，install name → @executable_path/../lib
          dylibbundler -od -b \
            -x "$STAGE/bin/aria2c" \
            -d "$STAGE/lib" \
            -p "@executable_path/../lib/"

          set +o pipefail
          VER="$( "$STAGE/bin/aria2c" -v 2>/dev/null | head -1 | sed -n 's/.*version \([0-9.]*\).*/\1/p' || true)"
          set -o pipefail
          VER="${VER:-1.37.0}"

          {
            echo "version=${VER}"
            echo "arch=${{ matrix.arch }}"
            echo "runner=${{ matrix.os }}"
            echo "brew_arch=${{ matrix.brew_arch }}"
            echo "relocatable=1"
            echo "built=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            set +o pipefail
            "$STAGE/bin/aria2c" -v 2>/dev/null | head -5 || true
            set -o pipefail
            echo "--- file ---"
            file "$STAGE/bin/aria2c"
            echo "--- otool ---"
            otool -L "$STAGE/bin/aria2c" | head -40
          } > "$STAGE/BUILD_INFO.txt"

          "$STAGE/bin/aria2c" -v | head -2

          OUT="${GITHUB_WORKSPACE}/aria2c-darwin-${{ matrix.arch }}.tar.gz"
          tar -C "$STAGE" -czf "$OUT" bin lib BUILD_INFO.txt
          ls -la "$OUT"
          tar -tzf "$OUT" | head -40

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria2c-darwin-${{ matrix.arch }}
          path: aria2c-darwin-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  release:
    name: publish-release
    needs: build
    if: always() && (needs.build.result == 'success' || needs.build.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
        continue-on-error: true

      - name: List
        run: find dist -type f -ls || true

      - name: Require at least one arch tarball
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/aria2c-darwin-*.tar.gz dist/**/aria2c-darwin-*.tar.gz)
          echo "found: ${files[*]:-none}"
          test ${#files[@]} -ge 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || (github.event.inputs.tag || 'v1.37.0') }}
          name: aria2c macOS ${{ github.ref_type == 'tag' && github.ref_name || (github.event.inputs.tag || 'v1.37.0') }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/aria2c-darwin-x86_64.tar.gz
            dist/aria2c-darwin-arm64.tar.gz
            dist/**/aria2c-darwin-*.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
